{% extends "base.html" %}
{% block title %}حذف{% endblock %}

{% block content %}
<section class="auth">
  <div class="auth__card reveal" style="max-width:30rem">
    <div class="auth__head">
      <h1 class="auth__title">حذف</h1>
      <p class="auth__sub">آیا از حذف «{{ object }}» مطمئن هستید؟ این کار قابل بازگشت نیست.</p>
    </div>
    <form method="post" class="form">
      {% csrf_token %}
      <button type="submit" class="btn btn--primary btn--block" style="background:var(--danger)">بله، حذف کن</button>
      <a class="btn btn--ghost btn--block" href="{% url 'animals:list' %}">انصراف</a>
    </form>
  </div>
</section>
{% endblock %}
