{% extends "base.html" %}
{% block title %}{% if form.instance.pk %}ویرایش حیوان{% else %}افزودن حیوان{% endif %}{% endblock %}
{% block content %}
  <h1>{% if form.instance.pk %}ویرایش حیوان{% else %}افزودن حیوان{% endif %}</h1>
  <form method="post" enctype="multipart/form-data" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">ذخیره</button>
    <a href="{% url 'animals:list' %}">انصراف</a>
  </form>
{% endblock %}
