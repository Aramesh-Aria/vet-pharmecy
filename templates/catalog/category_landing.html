{% extends "base.html" %}
{% block title %}{{ category.name }}{% endblock %}
{% block content %}
  <p><a href="{% url 'pages:home' %}">→ خانه</a></p>
  <h1>{{ category.name }}</h1>
  {% if category.description %}<p>{{ category.description }}</p>{% endif %}

  <h2>بخش‌ها</h2>
  <ul>
    {% for value, label in sections %}
      <li>
        <a href="{% url 'catalog:section' category.slug value %}">{{ label }}</a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
