{% comment %}Renders a Django form as styled .field rows. Expects `form`.{% endcomment %}
{% if form.non_field_errors %}<div class="form__error">{{ form.non_field_errors }}</div>{% endif %}
{% for field in form %}
  <div class="field{% if 'code' in field.name %} field--otp{% endif %}">
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}<span class="helptext">{{ field.help_text|safe }}</span>{% endif %}
    {{ field.errors }}
  </div>
{% endfor %}
