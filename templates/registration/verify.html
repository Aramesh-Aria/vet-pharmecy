{% extends "base.html" %}
{% block title %}تأیید شماره{% endblock %}
{% block content %}
  <h1>تأیید شماره موبایل</h1>
  <p>کد تأیید به شمارهٔ {{ phone }} ارسال شد.</p>
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form.non_field_errors }}
    <p>
      <label for="{{ form.code.id_for_label }}">{{ form.code.label }}</label><br>
      {{ form.code }}
      {{ form.code.errors }}
    </p>
    <button type="submit">تأیید</button>
  </form>
  <form method="post" action="{% url 'accounts:register_resend' %}">
    {% csrf_token %}
    <button type="submit">ارسال مجدد کد</button>
  </form>
{% endblock %}
