{% extends "base.html" %}
{% block title %}ثبت‌نام{% endblock %}
{% block content %}
  <h1>ثبت‌نام</h1>
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <p>
        <label for="{{ field.id_for_label }}">{{ field.label }}</label><br>
        {{ field }}
        {{ field.errors }}
      </p>
    {% endfor %}
    <button type="submit">ارسال کد تأیید</button>
  </form>
  <p>حساب دارید؟ <a href="{% url 'accounts:login' %}">ورود</a></p>
{% endblock %}
